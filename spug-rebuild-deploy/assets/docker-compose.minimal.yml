version: '3.9'
services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data

  backend:
    image: ${SPUG_BACKEND_IMAGE:-ghcr.io/shuiguanglianyan/spug-rebuild-backend:latest}
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  worker:
    image: ${SPUG_BACKEND_IMAGE:-ghcr.io/shuiguanglianyan/spug-rebuild-backend:latest}
    restart: always
    command: ["celery", "-A", "app.worker", "worker", "-l", "info"]
    depends_on:
      - backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_SECRET_KEY: ${APP_SECRET_KEY}

  web:
    image: ${SPUG_FRONTEND_IMAGE:-ghcr.io/shuiguanglianyan/spug-rebuild-frontend:latest}
    restart: always
    depends_on:
      - backend
    ports:
      - "${WEB_PORT}:80"

volumes:
  mysql_data:
  redis_data:
